<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <meta name="robots" content="noindex">
  <title>SpellRightPro — Offline</title>

  <link rel="stylesheet" href="/css/styles.css"/>
  <link rel="icon" href="/assets/logo.png"/>
  <link rel="manifest" href="/manifest.json"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"/>

  <!--
    No AdSense on this page:
    1. The user is offline — the script would fail to load anyway.
    2. Showing ads requires cookie consent — we cannot confirm that here.
    3. It's a fallback/error page; ads would harm the user experience.
  -->

  <!-- Firebase v8 compat — matches the rest of the site -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
  <script src="/js/config.js" defer></script>

  <!-- Google Analytics (async — will queue events and send when reconnected) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-H09MF13297"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-H09MF13297');
  </script>

  <style>
    body {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      font-family: 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 20px;
      margin: 0;
    }

    .offline-card {
      background: rgba(255,255,255,0.12);
      border-radius: 20px;
      backdrop-filter: blur(20px);
      box-shadow: 0 8px 32px rgba(0,0,0,0.2);
      padding: 40px 30px;
      max-width: 420px;
      width: 100%;
      border: 1px solid rgba(255,255,255,0.3);
      animation: fadeIn 0.6s ease;
    }

    .offline-card img {
      width: 80px;
      height: 80px;
      margin-bottom: 20px;
      filter: drop-shadow(0 2px 4px rgba(0,0,0,0.2));
    }

    .offline-card h1 {
      font-size: 1.8rem;
      margin-bottom: 10px;
      color: #fff;
      font-weight: 700;
    }

    .offline-card p {
      color: rgba(255,255,255,0.9);
      margin-bottom: 25px;
      font-size: 1rem;
      line-height: 1.6;
    }

    .btn-retry {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      background: linear-gradient(135deg, #4cc9f0, #4361ee);
      color: white;
      border: none;
      padding: 14px 24px;
      border-radius: 12px;
      cursor: pointer;
      font-weight: 600;
      font-size: 1rem;
      transition: all 0.3s ease;
      width: 100%;
      box-shadow: 0 4px 12px rgba(67,97,238,0.3);
    }

    .btn-retry:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 16px rgba(67,97,238,0.4);
    }

    .offline-footer {
      margin-top: 24px;
      font-size: 0.9rem;
      color: rgba(255,255,255,0.7);
    }

    .offline-footer a {
      color: #fff;
      text-decoration: underline;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="offline-card">
    <img src="/assets/logo.png" alt="SpellRightPro Logo"/>
    <h1>You're Offline</h1>
    <p>It looks like you've lost your internet connection.<br>
       Once you're back online your spelling sessions will continue right where you left off.</p>

    <button class="btn-retry" onclick="retryConnection()">
      <i class="fa fa-sync"></i> Try Again
    </button>

    <div class="offline-footer">
      <p>Need help? <a href="/contact.html">Contact Support</a></p>
    </div>
  </div>

  <script>
    function retryConnection() {
      // Show spinner while checking
      const btn = document.querySelector('.btn-retry');
      btn.innerHTML = '<i class="fa fa-spinner fa-spin"></i> Checking...';
      btn.disabled = true;

      // Try to fetch a tiny resource to confirm connectivity
      fetch('/assets/logo.png', { method: 'HEAD', cache: 'no-store' })
        .then(() => {
          // Back online — go back to where the user came from, or home
          window.location.href = document.referrer && document.referrer.includes(location.hostname)
            ? document.referrer
            : '/';
        })
        .catch(() => {
          btn.innerHTML = '<i class="fa fa-sync"></i> Still offline — try again';
          btn.disabled = false;
        });
    }

    // Auto-reload when connectivity is restored
    window.addEventListener('online', () => {
      window.location.reload();
    });

    // Track offline page view
    if (typeof gtag !== 'undefined') {
      gtag('event', 'offline_page_view', { page_path: window.location.pathname });
    }
  </script>
</body>
</html>
